name: Mark as Stale
on:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v8
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 7 days unless there is activity.
            Feel free to comment if you have more information or would like to contribute!
          stale-pr-message: |
            This pull request has been inactive for 30 days. It will be closed in 7 days unless there is activity.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
